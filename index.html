<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub Fixed</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.hidden { display:none; }

.box {
  width: 60px;
  height: 60px;
  position: absolute;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body class="bg-gray-900 text-white">

<!-- ================= MENU ================= -->
<div id="menu" class="p-6 text-center space-y-4">
  <h1 class="text-3xl font-bold">🎮 Game Hub</h1>

  <button onclick="openGame('music')" class="bg-pink-500 p-3 w-full rounded">🎵 Music Game</button>
  <button onclick="openGame('click')" class="bg-blue-500 p-3 w-full rounded"> Click Game</button>
</div>

<!-- ================= MUSIC GAME (FIXED CENTERED) ================= -->
<div id="music" class="hidden flex flex-col items-center justify-center min-h-screen space-y-6 text-center">

<button onclick="back()" class="bg-gray-700 p-2 rounded">⬅ Back</button>

<h2 class="text-xl">🎵 Press Play</h2>

<!-- ✅ ONLY ONE PLAYER + PROPER CENTERING -->
<div class="flex justify-center w-full">
  <div id="player" class="w-[320px] h-[180px] md:w-[480px] md:h-[270px]"></div>
</div>

<div id="countdown" class="text-6xl hidden font-bold"></div>

<div id="message" class="hidden text-lg">
I like the music… maybe I could dance salsa to it 💃
</div>

<button onclick="startMusic()" class="bg-pink-500 p-2 rounded">Play</button>

</div>

<!-- ================= CLICK GAME ================= -->
<div id="click" class="hidden text-center p-6">

<button onclick="back()" class="bg-gray-700 p-2 mb-3">⬅ Back</button>

<h2>Click Game</h2>
<p>Score: <span id="score">0</span></p>

<div id="game" class="relative w-96 h-96 bg-gray-800 mx-auto mt-3 rounded"></div>

<button onclick="startClickGame()" class="bg-blue-500 p-2 mt-3">Start</button>

</div>

<!-- ================= RPG ================= -->
<div id="rpg" class="hidden p-6 text-center space-y-3">

<button onclick="back()" class="bg-gray-700 p-2">⬅ Back</button>

<h2>⚔️ RPG Mode</h2>

<p id="rpgText">Press start to enter dungeon</p>

<button onclick="startRPG()" class="bg-green-500 p-2">Start RPG</button>

</div>

<script>

/* ================= NAVIGATION ================= */
function openGame(id){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

function back(){
  document.querySelectorAll("#music,#click,#rpg").forEach(e => e.classList.add("hidden"));
  document.getElementById("menu").classList.remove("hidden");
}

/* ================= MUSIC GAME ================= */
let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player', {
    videoId: 'gKuwCG7EYM8'
  });
}

function startMusic(){
  const countdown = document.getElementById("countdown");
  const message = document.getElementById("message");

  message.classList.add("hidden");
  countdown.classList.remove("hidden");

  let count = 3;
  countdown.innerText = count;

  let timer = setInterval(() => {
    count--;

    if(count > 0){
      countdown.innerText = count;
    } else {
      clearInterval(timer);

      countdown.classList.add("hidden");
      message.classList.remove("hidden");

      if(player && player.playVideo){
        player.playVideo();
      }
    }
  }, 1000);
}

/* ================= CLICK GAME ================= */
let score = 0;
let interval;

function startClickGame(){
  score = 0;
  document.getElementById("score").innerText = score;
  document.getElementById("game").innerHTML = "";

  clearInterval(interval);
  interval = setInterval(spawnBox, 800);
}

function spawnBox(){
  const game = document.getElementById("game");

  const box = document.createElement("div");
  box.classList.add("box");

  const good = Math.random() > 0.5;

  box.style.background = good ? "limegreen" : "red";
  box.style.left = Math.random()*300 + "px";
  box.style.top = Math.random()*300 + "px";

  box.onclick = () => {
    score += good ? 1 : -1;
    document.getElementById("score").innerText = score;
    box.remove();
  };

  game.appendChild(box);

  setTimeout(() => box.remove(), 1000);
}

/* ================= RPG ================= */
function startRPG(){
  document.getElementById("rpgText").innerText =
    "⚔️ You entered a dungeon... (RPG expansion ready next)";
}

</script>

<script src="https://www.youtube.com/iframe_api"></script>

          bg-white/20 hover:bg-white/40 rounded-full

</a>
</body>
</html>
