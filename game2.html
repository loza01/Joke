<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Save Game</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #8BDEE4;
}

.glass {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.3);
}

.cell {
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.2);
  border-radius: 4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  cursor:pointer;
  user-select:none;
  color:black;
}

.flash { background:#22c55e !important; }
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div class="glass p-6 text-center w-fit">

<h1 class="text-2xl font-bold mb-2">🧠 Memory Save Game</h1>

<p>Round: <span id="round">1</span></p>

<p class="text-sm mt-1">
🏆 Best Round: <span id="bestRound">0</span>
</p>

<div class="flex justify-between text-sm mt-2 mb-3">
  <p>✅ Correct: <span id="correctCount">0</span></p>
  <p>❌ Wrong: <span id="wrongCount">0</span></p>
</div>

<div id="grid" class="grid grid-cols-12 gap-1"></div>

<button onclick="startRound()" class="mt-4 bg-blue-500 px-4 py-2 rounded text-white">
Start / Next Round
</button>

<p id="info" class="mt-3 font-semibold"></p>

</div>

<script>

let round = 1;
let correctTiles = [];
let showing = false;
let roundActive = false;

let correctCount = 0;
let wrongCount = 0;
let found = 0;

// 💾 LOAD BEST SCORE
let bestRound = localStorage.getItem("bestRound") || 0;
document.getElementById("bestRound").innerText = bestRound;

function saveBest(){
  if(round > bestRound){
    bestRound = round;
    localStorage.setItem("bestRound", bestRound);
    document.getElementById("bestRound").innerText = bestRound;
  }
}

function updateUI(){
  document.getElementById("round").innerText = round;
  document.getElementById("correctCount").innerText = correctCount;
  document.getElementById("wrongCount").innerText = wrongCount;
}

function createGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=0;i<144;i++){
    let div = document.createElement("div");
    div.className = "cell";
    div.onclick = () => handleClick(i, div);
    grid.appendChild(div);
  }
}

function randomNumber(){
  return Math.floor(Math.random()*90 + 10);
}

function startRound(){

  if(roundActive) return;

  createGrid();

  correctTiles = [];
  found = 0;
  showing = true;
  roundActive = true;

  document.getElementById("info").innerText = "Memorize for 7 seconds...";

  let count = Math.min(3 + round, 15);

  for(let i=0;i<count;i++){
    let index = Math.floor(Math.random()*144);
    let num = randomNumber();

    correctTiles.push(index);

    let cell = document.querySelectorAll(".cell")[index];
    cell.innerText = num;
    cell.classList.add("flash");
  }

  setTimeout(() => {

    document.querySelectorAll(".cell").forEach(c => {
      c.innerText = "";
      c.classList.remove("flash");
    });

    showing = false;
    document.getElementById("info").innerText = "Find the numbers!";

  }, 7000);

}

function handleClick(index, el){

  if(showing || !roundActive) return;

  if(correctTiles.includes(index)){

    if(el.dataset.clicked) return;

    el.dataset.clicked = true;
    el.innerText = "✔";
    el.style.background = "rgba(34,197,94,0.7)";

    correctCount++;
    found++;
    updateUI();

    if(found === correctTiles.length){

      saveBest(); // 💾 SAVE ON WIN

      round++;
      roundActive = false;

      document.getElementById("info").innerText = " Round Passed!";

      setTimeout(startRound, 1200);
    }

  } else {

    if(el.dataset.clicked) return;

    el.dataset.clicked = true;
    el.innerText = "✖";
    el.style.background = "rgba(239,68,68,0.7)";

    wrongCount++;
    updateUI();

    document.getElementById("info").innerText = "❌ Round Failed! Restarting...";

    saveBest(); // 💾 SAVE BEFORE RESET

    round = 1;
    roundActive = false;

    setTimeout(startRound, 1500);
  }
}

createGrid();
updateUI();

</script>
<a href="index.html"
   class="fixed top-4 left-4 w-10 h-10 flex items-center justify-center
          bg-white/20 hover:bg-white/40 rounded-full
          backdrop-blur-md border border-white/30 shadow-lg">

</a>

</a>

          bg-white/20 hover:bg-white/40 rounded-full
          backdrop-blur-md border border-white/30 shadow-lg">
  Pingpong
</a>
</body>
</html>
